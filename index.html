<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualización de Álbumes - Discografía</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <style>
        body { font-family: sans-serif; margin: 20px; background-color: #f4f4f9; }
        #grafico { width: 100%; max-width: 900px; height: 500px; margin: auto; background: white; border: 1px solid #ddd; }
        h2 { text-align: center; color: #333; }
    </style>
</head>
<body>

    <h2>Rate de Álbums a lo largo del tiempo</h2>
    <div id="grafico"></div>

    <script>
        fetch("dataset.json")
        .then(response => response.json())
        .then(datos => {
            
            const añosRepresentativos = [1959, 1960, 1981, 1985, 1997, 2020];
            const anotaciones = [];

            añosRepresentativos.forEach(año => {
                const albumDestacado = datos.find(d => d.Año === año);
                if (albumDestacado) {
                    anotaciones.push({
                        x: albumDestacado.Año,
                        y: albumDestacado.Rate,
                        text: `<b>"${albumDestacado.Álbum}" (${albumDestacado.Rate})</b>`,
                        showarrow: true,
                        arrowhead: 2,
                        ax: 0,
                        ay: (año === 1985 || año === 1959) ? 60 : -50, // Especial para 1985 y 1959, para que no superponer
                        standoff: 15,
                        font: { size: 10, color: '#333' },
                        bgcolor: 'rgba(255, 255, 255, 0.85)',
                        bordercolor: '#999',
                        borderwidth: 1,
                        borderpad: 4
                    });
                }
            });

            // Colores
            const paletaColores = {
                "Violeta Parra": "#8E44AD", // Violeta claramente
                "Folklore": "#F39C12", // Amarillo
                "Victor Jara": "#E74C3C", // Rojo
                "Rock": "#3498DB", // Azul
                "Otro": "#2ECC71" // Verde
            };

            const maxRatings = Math.max(...datos.map(d => d.Ratings || 1));
            const sizeRef = 2.0 * maxRatings / (40**2);

            const generosUnicos = [...new Set(datos.map(d => d.Género))];

            const traces = generosUnicos.map(genero => {
                const datosGenero = datos.filter(d => d.Género === genero);

                return {
                    x: datosGenero.map(d => d.Año),
                    y: datosGenero.map(d => d.Rate),
                    text: datosGenero.map(d => d.Álbum),
                    mode: 'markers',
                    type: 'scatter',
                    name: genero, // Leyenda
                    marker: {
                        size: datosGenero.map(d => d.Ratings),
                        sizemode: 'area',
                        sizeref: sizeRef, // Usamos la misma referencia para todos
                        sizemin: 4,
                        color: paletaColores[genero] || "#E74C3C", // Color predeterminado
                        line: { width: 1, color: 'white' }
                    }
                };
            });


            // CONTEXTO
            const albumParaComentario = datos.find(d => d.Año === 2006);
            if (albumParaComentario) {
                const comentarioTextoPos = { x: 2012, y: 1.8 }; // Arbitrario

                anotaciones.push({ // Cuadro de texto
                    x: comentarioTextoPos.x,
                    y: comentarioTextoPos.y,
                    xref: 'x', yref: 'y',
                    text: '<i>El tamaño del punto representa la<br>cantidad de calificaciones que obtuvo</i>',
                    showarrow: false, // El cuadro no tiene flecha propia.
                    font: { size: 11, color: 'black' },
                    bgcolor: '#f2f2f2', // Gris
                    bordercolor: '#000000',
                    borderwidth: 1,
                    borderpad: 6
                });

                anotaciones.push({ // Flecha roja
                    x: comentarioTextoPos.x,
                    y: comentarioTextoPos.y + 0.3, // +0.3 para no tapar el texto
                    xref: 'x', yref: 'y',
                    text: '',
                    showarrow: true,
                    arrowhead: 2,
                    arrowsize: 1,
                    arrowwidth: 2,
                    arrowcolor: 'red',
                    axref: 'x', ayref: 'y',
                    ax: albumParaComentario.Año,
                    ay: albumParaComentario.Rate
                });
            }

            anotaciones.push({ // Comentario sobre estrellas
                xref: 'paper', yref: 'paper',
                x: 1.01,
                y: 0.5,
                xanchor: 'left',
                yanchor: 'top',
                text: '<i>El rate se basa en<br>una calificación<br>de 0 a 5 estrellas,<br>siendo 0 lo más<br>bajo y 5 lo más alto.</i>',
                showarrow: false,
                font: { size: 11, color: 'black' },
                bgcolor: '#f2f2f2',
                bordercolor: '#000000',
                borderwidth: 1,
                borderpad: 6
            });

            const layout = {
                title: 'Álbums Chilenos Top 1 en Ranking Nacional (Rate Your Music)',
                xaxis: { title: 'Año', tickformat: 'd' },
                yaxis: { title: 'Rate (Calificación)', range: [0, 5] },
                hovermode: 'closest',
                annotations: anotaciones,
                plot_bgcolor: '#fafafa',
                paper_bgcolor: '#ffffff',
                legend: {
                        title: {
                            text: '<b>Categoría</b>',
                            font: { size: 13, color: '#333' }
                        }
                    }
            };

            const config = { responsive: true };

            Plotly.newPlot('grafico', traces, layout, config);
        })
        .catch(error => console.error("Error cargando dataset:", error));
    </script>
</body>
</html>

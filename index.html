<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualización de Álbumes - Violeta Parra</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <style>
        body { font-family: sans-serif; margin: 20px; background-color: #f4f4f9; }
        #grafico { width: 100%; max-width: 900px; height: 500px; margin: auto; }
        h2 { text-align: center; color: #333; }
    </style>
</head>
<body>

    <h2>Año vs Rate: Discografía</h2>
    <div id="grafico"></div>

    <script>
        fetch("dataset.json")
        .then(response => response.json())
        .then(datos => {

            const añosRepresentativos = [1959, 1981, 1985, 1997, 2020];
            const anotaciones = [];

            añosRepresentativos.forEach(año => {
                // Buscamos el disco que corresponda a ese año
                const albumDestacado = datos.find(d => d.Año === año);
                
                if (albumDestacado) {
                    anotaciones.push({
                        x: albumDestacado.Año,
                        y: albumDestacado.Rate,
                        text: `<b>${albumDestacado.Álbum} (${albumDestacado.Rate})</b>`,
                        showarrow: true,
                        arrowhead: 2,
                        ax: 0,
                        ay: -50,
                        standoff: 15, 
                        font: { size: 10, color: '#333' },
                        bgcolor: 'rgba(255, 255, 255, 0.85)',
                        bordercolor: '#999',
                        borderwidth: 1,
                        borderpad: 4
                    });
                }
            });
            const trace = {
                x: datos.map(d => d.Año),
                y: datos.map(d => d.Rate),
                text: datos.map(d => d.Álbum), // Para E2
                mode: 'markers',
                type: 'scatter',
                marker: {
                    size: datos.map(d => d.Ratings), // Bubble
                    sizemode: 'area',
                    sizeref: 2.0 * Math.max(...datos.map(d => d.Ratings)) / (40**2), // Ajuste al cuadrado para evitar exageraciones
                    sizemin: 4,
                    color: '#d62728',
                    line: { width: 1, color: 'white' }
                }
            };

            const layout = {
                title: 'Rate de Álbumes a lo largo del tiempo',
                xaxis: {
                    title: 'Año',
                    tickformat: 'd'
                },
                yaxis: {
                    title: 'Rate (Calificación)',
                    range: [0, 5] // máximo 5 estrellas
                },
                hovermode: 'closest',
                annotations: anotaciones
            };

            const config = { responsive: true };

            // Generar el gráfico
            Plotly.newPlot('grafico', [trace], layout, config);
        })
        .catch(error => console.error("Error cargando dataset:", error));
    </script>
</body>
</html>

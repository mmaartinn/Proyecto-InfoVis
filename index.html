<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualización de Álbumes - Discografía</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.26/Tone.min.js"></script>
    <style>
        body { font-family: sans-serif; margin: 20px; background-color: #f4f4f9; }
        #contenedor-principal {
            display: flex;

            justify-content: center;

            align-items: flex-start;

            gap: 25px;

            margin-top: 20px;
        }
        #grafico {
            width: 900px;
            height: 500px;

            background: white;

            border: 1px solid #ddd;
        }        
        #panel-ratings {

            width: 250px;

            padding: 18px;

            background: white;

            border: 1px solid #ccc;

            border-radius: 0px;

            text-align: center;

            box-shadow: 0 2px 8px rgba(0,0,0,0.1);

            font-family: "Open Sans", verdana, arial, sans-serif;
        }

        #barra-container {
            width: 100%;
            height: 30px;

            background-color: #e0e0e0;

            /* CUADRADO */
            border-radius: 0px;

            overflow: hidden;

            margin-top: 15px;
        }

        #barra-ratings {
            height: 100%;
            width: 0%;

            background-color: #000000;

            /* CUADRADO */
            border-radius: 0px;

            transition: width 0.3s ease;
        }

        #texto-ratings {
            margin-top: 10px;

            font-size: 16px;

            font-weight: 600;

            color: #333;
        }
        h2 { text-align: center; color: #333; }
    </style>
</head>
<body>

    <h2>Rate de Álbums a lo largo del tiempo</h2>

    <button id="iniciar-audio" style="display: block; margin: 0 auto 20px auto; padding: 10px 20px; font-size: 16px; cursor: pointer; background-color: #3498DB; color: white; border: none; border-radius: 5px;">
        Activar Sonido
    </button>

    <div id="contenedor-principal">

        <div id="grafico"></div>

        <div id="panel-ratings">
            <h3 id="album-nombre">Álbum</h3>

            <div id="barra-container">
                <div id="barra-ratings"></div>
            </div>

            <p id="texto-ratings">0 ratings</p>
        </div>

    </div>


    <script>

        // Usamos Tone.Player para un archivo de audio simple 
        const reproductor = new Tone.Player({
            url: "audio.mp3",
            autostart: false,
            onload: () => console.log("Audio cargado y listo")
        }).toDestination(); // Conectamos a los parlantes [cite: 28]

        // Lógica del botón para iniciar el contexto de audio
        const btnIniciar = document.getElementById('iniciar-audio');
        btnIniciar.addEventListener('click', async () => {
            await Tone.start(); // Iniciamos el contexto con el click 
            console.log('Contexto de audio iniciado'); // [cite: 79]
            btnIniciar.style.display = 'none'; // Ocultamos el botón una vez activado
        });

        fetch("dataset.json")
        .then(response => response.json())
        .then(datos => {
            
            const añosRepresentativos = [];
            const anotaciones = [];

            // ------- PARA AUDIOS -------
            const rutasAudios = {};
            datos.forEach(d => {
                if (d.Cancion) {
                    rutasAudios[d.Cancion] = `audios/${d.Cancion}`;
                }
            });
            // Cargamos todos los audios
            // Filtro global
            const filtro = new Tone.Filter({
                type: "lowpass",
                frequency: 5000
            }).toDestination();

            // Players conectados al filtro
            const reproductores = new Tone.Players(rutasAudios).connect(filtro);            // ---------------------

            añosRepresentativos.forEach(año => {
                const albumDestacado = datos.find(d => d.Año === año);
                if (albumDestacado) {
                    anotaciones.push({
                        x: albumDestacado.Año,
                        y: albumDestacado.Rate,
                        text: `<b>"${albumDestacado.Álbum}" (${albumDestacado.Rate})</b>`,
                        showarrow: true,
                        arrowhead: 2,
                        ax: 0,
                        ay: (año === 1985 || año === 1959) ? 60 : -50, // Especial para 1985 y 1959, para que no superponer
                        standoff: 15,
                        font: { size: 10, color: '#333' },
                        bgcolor: 'rgba(255, 255, 255, 0.85)',
                        bordercolor: '#999',
                        borderwidth: 1,
                        borderpad: 4
                    });
                }
            });

            // Colores
            const paletaColores = {
                "Violeta Parra": "#8E44AD", // Violeta claramente
                "Folklore": "#F39C12", // Amarillo
                "Victor Jara": "#E74C3C", // Rojo
                "Rock": "#3498DB", // Azul
                "Otro": "#2ECC71" // Verde
            };

            const maxRatings = Math.max(...datos.map(d => d.Ratings || 1));
            const sizeRef = 2.0 * maxRatings / (40**2);

            const generosUnicos = [...new Set(datos.map(d => d.Género))];

            const traces = generosUnicos.map(genero => {
                const datosGenero = datos.filter(d => d.Género === genero);

                return {
                    x: datosGenero.map(d => d.Año),
                    y: datosGenero.map(d => d.Rate),
                    text: datosGenero.map(d => d.Álbum),

                    customdata: datosGenero.map(d => d.Cancion), 

                    mode: 'markers',
                    type: 'scatter',
                    name: genero,
                    marker: {
                        size: 10,
                        color: paletaColores[genero] || "#E74C3C",
                        line: { width: 1, color: 'white' }
                    }
                };
            });

            // CONTEXTO
            anotaciones.push({ // Comentario sobre tamaño de puntos
                xref: 'paper', yref: 'paper',
                x: 1.01,
                y:  0.2,
                xanchor: 'left',
                yanchor: 'top',
                text: '<i>El tamaño del punto<br>representa la cantidad<br>de calificaciones<br>que obtuvo</i>',
                showarrow: false, // El cuadro no tiene flecha propia.
                font: { size: 11, color: 'black' },
                bgcolor: '#f2f2f2', // Gris
                bordercolor: '#000000',
                borderwidth: 1,
                borderpad: 6
            });


            anotaciones.push({ // Comentario sobre estrellas
                xref: 'paper', yref: 'paper',
                x: 1.01,
                y: 0.5,
                xanchor: 'left',
                yanchor: 'top',
                text: '<i>El rate se basa en<br>una calificación<br>de 0 a 5 estrellas,<br>siendo 0 lo más<br>bajo y 5 lo más alto.</i>',
                showarrow: false,
                font: { size: 11, color: 'black' },
                bgcolor: '#f2f2f2',
                bordercolor: '#000000',
                borderwidth: 1,
                borderpad: 6
            });

            const layout = {
                title: 'Álbums Chilenos Top 1 en Ranking Nacional (Rate Your Music)',
                xaxis: { title: 'Año', tickformat: 'd' },
                yaxis: { title: 'Rate (Calificación)', range: [0, 5] },
                hovermode: 'closest',
                annotations: anotaciones,
                plot_bgcolor: '#fafafa',
                paper_bgcolor: '#ffffff',
                legend: {
                        title: {
                            text: '<b>Categoría</b>',
                            font: { size: 13, color: '#333' }
                        }
                    }
            };

            const config = { responsive: true };

            Plotly.newPlot('grafico', traces, layout, config);

            const miGrafico = document.getElementById('grafico');

            // Evento que detecta cuando el cursor pasa sobre un punto del gráfico
            miGrafico.on('plotly_hover', function(data){
                if (Tone.context.state === "running") {
                    // Extraemos el nombre de la canción guardado en customdata
                    const cancionAsociada = data.points[0].customdata;
                    const punto = data.points[0];
                    const album = punto.text;

                    const datosAlbum = datos.find(d => d.Álbum === album);
                    const ratings = datosAlbum.Ratings;
                    const rate = datosAlbum.Rate;
                    const frecuenciaFiltro = 200 + ((rate / 5) * 12000);
                    filtro.frequency.rampTo(frecuenciaFiltro, 0.2);
                    const volumenNormalizado = ratings / maxRatings;
                    const volumenDB = -35 + (volumenNormalizado * 35);
                    if (datosAlbum) {

                        const ratings = datosAlbum.Ratings;

                        // porcentaje respecto al máximo
                        const porcentaje = (ratings / maxRatings) * 100;

                        document.getElementById("album-nombre").innerText = album;

                        document.getElementById("barra-ratings").style.width = `${porcentaje}%`;

                        document.getElementById("texto-ratings").innerText =
                            `${ratings.toLocaleString()} ratings`;
                    }

                    if (cancionAsociada && reproductores.has(cancionAsociada)) {
                        // Detenemos cualquier audio que esté sonando para que no se mezclen
                        reproductores.stopAll();
                        
                        // Reproducimos la canción específica de este álbum
                        reproductores.player(cancionAsociada).volume.value = volumenDB;
                        reproductores.player(cancionAsociada).start();
                    }
                }
            });

        })
        .catch(error => console.error("Error cargando dataset:", error));
    </script>
</body>
</html>
